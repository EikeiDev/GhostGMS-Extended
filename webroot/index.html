<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostGMS Control Center</title>
<style>
:root { --bg-color: #0a0c10; --card-bg: rgba(255, 255, 255, 0.03); --accent-color: #00f2ff; --text-color: #e0e6ed; --secondary-text: #94a3b8; --border-color: rgba(255, 255, 255, 0.08); --success-color: #10b981; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; padding-bottom: 120px; line-height: 1.5; }
.header { margin-bottom: 20px; text-align: center; }
.header h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #fff 0%, var(--accent-color) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
.status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; background: rgba(16, 185, 129, 0.1); color: var(--success-color); border: 1px solid rgba(16, 185, 129, 0.2); margin-bottom: 20px; }
.section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-color); margin: 25px 0 12px 5px; opacity: 0.8; }
.card-grid { display: grid; grid-template-columns: 1fr; gap: 10px; transition: opacity 0.3s ease; }
.card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); }
.card-info { display: flex; flex-direction: column; }
.card-label { font-size: 16px; font-weight: 600; }
.card-desc { font-size: 12px; color: var(--secondary-text); margin-top: 2px; }
.switch { position: relative; display: inline-block; width: 46px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .3s; border-radius: 24px; }
.slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
input:checked + .slider { background-color: var(--accent-color); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
input:checked + .slider:before { transform: translateX(22px); }
.disabled-section { opacity: 0.4; pointer-events: none; }
.action-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 20px; padding: 12px; display: flex; justify-content: center; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); z-index: 100; }
.btn { background: var(--accent-color); color: #000; border: none; padding: 14px; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; width: 100%; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2); }
#loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 1000; }
.spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-top: 4px solid var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div></div>
<div class="header">
<h1>GhostGMS</h1>
<div class="status-badge">System Active</div>
</div>
<div class="section-title">Core Tweaks</div>
<div class="card-grid">
<div class="card"><div class="card-info"><span class="card-label">GMS Logging</span><span class="card-desc">Disable data collection logs</span></div><label class="switch"><input type="checkbox" id="ENABLE_LOG_DISABLE"><span class="slider"></span></label></div>
<div class="card"><div class="card-info"><span class="card-label">System Properties</span><span class="card-desc">Apply optimized props</span></div><label class="switch"><input type="checkbox" id="ENABLE_SYS_PROPS"><span class="slider"></span></label></div>
<div class="card"><div class="card-info"><span class="card-label">UI Blurs</span><span class="card-desc">Disable blurs for performance</span></div><label class="switch"><input type="checkbox" id="ENABLE_BLUR_DISABLE"><span class="slider"></span></label></div>
</div>
<div class="section-title">Advanced Control</div>
<div class="card-grid">
<div class="card"><div class="card-info"><span class="card-label">Service Master Switch</span><span class="card-desc">Enable category-based blocking</span></div><label class="switch"><input type="checkbox" id="ENABLE_SERVICES_DISABLE"><span class="slider"></span></label></div>
</div>
<div class="section-title" id="cat-title">Service Categories</div>
<div class="card-grid" id="service-grid"></div>
<div class="action-bar"><button class="btn" id="save-btn">SAVE & APPLY CHANGES</button></div>
<script src="main.js"></script>
</body>
</html>
